{% extends 'base/base.html' %}

{% block title %}Profile - KTU PYQ Analyzer{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:70vh;align-items:center;padding:2rem 0;">
    <div class="col-md-6 col-lg-5">
        <div class="premium-card animate-entrance" data-aos="fade-up" style="padding:2.5rem;">
            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#FFF;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(99,102,241,0.35);">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div>
                            <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:var(--text-primary);margin:0;font-size:1.5rem;">Profile</h3>
                            <p style="color:var(--text-muted);font-size:0.85rem;margin:0;">Manage your account details</p>
                        </div>
                    </div>
                </div>
                <a href="{% url 'users:profile_edit' %}" class="btn-glow" style="padding:0.5rem 1.25rem;font-size:0.85rem;">
                    <i class="bi bi-pencil me-1"></i> Edit
                </a>
            </div>

            <div class="d-flex flex-column gap-3 mb-4">
                <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:14px;padding:1.15rem 1.25rem;">
                    <small style="color:var(--text-muted);display:block;margin-bottom:0.35rem;font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em;">Name</small>
                    <span style="font-weight:600;color:var(--text-primary);font-size:1rem;">{{ user.get_display_name|default:user.email }}</span>
                </div>
                <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:14px;padding:1.15rem 1.25rem;">
                    <small style="color:var(--text-muted);display:block;margin-bottom:0.35rem;font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em;">Email</small>
                    <span style="font-weight:600;color:var(--text-primary);font-size:1rem;">{{ user.email }}</span>
                </div>
            </div>

            <div class="d-flex gap-3">
                <a href="{% url 'core:dashboard' %}" class="btn-glass flex-fill text-center" style="padding:0.65rem 1rem;border-radius:12px;">
                    <i class="bi bi-arrow-left me-1"></i> Dashboard
                </a>
                <a href="{% url 'users:logout' %}" class="btn-glow-danger flex-fill text-center" style="padding:0.65rem 1rem;border-radius:12px;">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
