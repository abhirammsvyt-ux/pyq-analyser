{% extends 'base/base.html' %}

{% block title %}{% if object %}Edit{% else %}Create{% endif %} Rule - {{ subject.name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="premium-card animate-entrance p-4">
                <h1 class="page-heading mb-2" data-word-stagger>
                    <i class="bi bi-shield-check"></i> {% if object %}Edit Rule{% else %}Create Rule{% endif %}
                </h1>
                <p class="mb-4" style="color: var(--text-secondary);">{{ subject.name }}</p>

                <div class="divider-frost mb-4"></div>

                <form method="post">
                    {% csrf_token %}
                    <div class="form-section">
                        {{ form.as_p }}
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-glow flex-grow-1">
                            <i class="bi bi-check-lg me-1"></i> Save
                        </button>
                        <a href="{% url 'rules:list' subject_pk=subject.pk %}" class="btn btn-glass flex-grow-1 text-center">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
